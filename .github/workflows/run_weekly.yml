name: Weekly Portfolio Run

on:
  schedule:
    # 07:00 UTC every Friday (08:00 Europe/Zurich during standard time CET)
    - cron: '0 7 * * 5'
  workflow_dispatch: # Enable manual trigger from GitHub UI for testing

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Run Portfolio Agent Pipeline
        env:
          PYTHONPATH: ${{ github.workspace }}
          # Expose GitHub Actions Secrets to the environment for the Python script
          ETORO_PUBLIC_API_KEY: ${{ secrets.ETORO_PUBLIC_API_KEY }}
          ETORO_USER_KEY: ${{ secrets.ETORO_USER_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
        run: |
          python src/main.py
          
      - name: Upload execution artifacts
        # We upload all generated JSON outputs from out/ directory to the action run
        uses: actions/upload-artifact@v4
        with:
          name: portfolio-outputs-${{ github.run_id }}
          path: out/*.json
          retention-days: 14
