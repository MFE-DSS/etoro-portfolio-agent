# Mapping of tickers to their corresponding metadata for calculating the Portfolio Overlay
# Fields:
# - name: Friendly name (optional)
# - sector: Sector grouping (e.g. Technology, Healthcare, Energy, Financials, Consumer Defensive, etc.)
# - region: Regional grouping (e.g. US, Europe, Emerging, Global, etc.)
# - asset_type: Type of the asset (e.g. Equity, Crypto, ETF, Commodity)
# - role: Portfolio role (e.g. core, hedge, swing, optional)
# - factor_bucket: One of: energy, defensives, quality, us_growth, commodities, rates_sensitive, other

