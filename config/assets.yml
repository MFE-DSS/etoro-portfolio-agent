# config/assets.yml — Asset metadata mapping
#
# Fields per ticker:
#   name                   : Friendly display name
#   sector                 : Sector grouping (GICS-aligned)
#   region                 : US / Europe / Emerging / Asia / Global
#   asset_type             : Equity / ETF / Crypto / Commodity / Bond
#   role                   : core / hedge / swing / optional
#   factor_bucket          : energy / defensives / quality / us_growth /
#                            commodities / rates_sensitive / em_growth / other
#   asset_class_all_weather: Canonical All-Weather bucket used by the
#                            alignment engine (must match target_builder targets)
#   inflation_sensitivity  : high / medium / low / negative
#                            high     = benefits from rising inflation
#                            medium   = moderate correlation
#                            low      = mostly uncorrelated
#                            negative = hurt by rising inflation (e.g. long bonds)
#   etoro_instrument_id    : Optional numeric eToro instrumentID — allows
#                            normalize.py to resolve IDs without hardcoding them.
#                            Obtain from the eToro Discovery API or API portal.

# ── US Large-Cap Growth / Quality Equities ─────────────────────────────────
#
# etoro_instrument_id — numeric ID returned by the eToro API for this instrument.
# HOW TO VERIFY: In the eToro app, open the instrument page and check the URL
# (e.g., etoro.com/markets/aapl → id visible in API calls), or query:
#   GET https://public-api.etoro.com/api/v1/market-data/search?internalSymbolFull=AAPL
# IDs marked "verified" have been confirmed against a live API response.
# IDs without a "verified" note are best-guess and should be confirmed.
# IMPORTANT: Remove or correct an entry if it resolves to the wrong position.

