# config/assets.yml — Asset metadata mapping
#
# Fields per ticker:
#   name                   : Friendly display name
#   sector                 : Sector grouping (GICS-aligned)
#   region                 : US / Europe / Emerging / Asia / Global
#   asset_type             : Equity / ETF / Crypto / Commodity / Bond
#   role                   : core / hedge / swing / optional
#   factor_bucket          : energy / defensives / quality / us_growth /
#                            commodities / rates_sensitive / em_growth / other
#   asset_class_all_weather: Canonical All-Weather bucket — must match target_builder targets:
#                              "Global Equities - Quality"
#                              "Global Equities - Value/Cyclicals"
#                              "Defensive Equities"
#                              "Duration (Bonds)"
#                              "Gold"
#                              "Broad Commodities"
#                              "Energy Tilt"
#                              "Cash-like / T-bills"
#   inflation_sensitivity  : high / medium / low / negative
#   etoro_instrument_id    : Numeric eToro instrumentID. Verified entries are
#                            cross-checked against live portfolio weight matches.
#                            HOW TO VERIFY:
#                              GET https://public-api.etoro.com/api/v1/market-data/search
#                                  ?internalSymbolFull=<TICKER>

# ═══════════════════════════════════════════════════════════════════════════════
# PORTFOLIO ACTUEL — @RealRandyMarsh (verified 2026-03-08)
# ═══════════════════════════════════════════════════════════════════════════════
